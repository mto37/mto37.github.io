baseURL: "https://mto37.github.io/"
languageCode: "en-US"
defaultContentLanguage: "en"
title: "mto37"

module:
  imports:
    - path: github.com/adityatelange/hugo-PaperMod

enableRobotsTXT: true
enableEmoji: true
pagination:
  pagerSize: 10

params:
  env: production
  title: "mto37"
  defaultTheme: auto
  ShowReadingTime: true
  ShowShareButtons: true
  ShowPostNavLinks: true
  ShowBreadCrumbs: true
  ShowCodeCopyButtons: true
  homeInfoParams:
    Title: "Hello, welcome to my blog"
    Content: "Notes on ideas, books, and life."
  socialIcons:
    - name: github
      url: "https://github.com/mto37"

menu:
  main:
    - identifier: archives
      name: Archives
      url: /archives/
      weight: 10
    - identifier: tags
      name: Tags
      url: /tags/
      weight: 20

outputs:
  home:
    - HTML
    - RSS
    - JSON
