baseURL: "https://mto37.github.io/"
languageCode: "zh-CN"
title: "mto37"
theme: "PaperMod"

module:
  imports:
    - path: github.com/adityatelange/hugo-PaperMod

enableRobotsTXT: true
enableEmoji: true
pagination:
  pagerSize: 10

params:
  env: production
  title: "mto37"
  defaultTheme: auto
  ShowReadingTime: true
  ShowShareButtons: true
  ShowPostNavLinks: true
  ShowBreadCrumbs: true
  ShowCodeCopyButtons: true
  homeInfoParams:
    Title: "你好，欢迎来到我的博客"
    Content: "记录思考、阅读与生活。"
  socialIcons:
    - name: github
      url: "https://github.com/mto37"

menu:
  main:
    - identifier: archives
      name: 归档
      url: /archives/
      weight: 10
    - identifier: tags
      name: 标签
      url: /tags/
      weight: 20
    - identifier: search
      name: 搜索
      url: /search/
      weight: 30

outputs:
  home:
    - HTML
    - RSS
    - JSON
